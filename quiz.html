<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Làm Quiz - ICTutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Đang tải quiz...</p>
    </div>

    <div id="quiz-container" style="display: none;">
      <div class="quiz-header">
        <h1 id="quiz-topic"></h1>
        <div class="progress-bar">
          <div id="progress" class="progress"></div>
        </div>
        <p id="question-counter"></p>
      </div>

      <div class="quiz-content">
        <h2 id="question-text"></h2>
        <div id="options-container"></div>
      </div>

      <div class="quiz-footer">
        <button id="prev-btn" onclick="prevQuestion()" disabled>
          <span>← Câu trước</span>
        </button>
        <button id="next-btn" onclick="nextQuestion()">
          <span>Câu tiếp →</span>
        </button>
        <button id="submit-btn" onclick="submitQuiz()" style="display: none;">
          <span>Nộp bài</span>
        </button>
      </div>
    </div>

    <div id="result-container" style="display: none;">
      <div class="result-card">
        <h1>Kết quả bài làm</h1>
        <div id="score-circle"></div>
        <p id="score-text"></p>
        <div>
          <button onclick="location.reload()">Làm lại</button>
          <button onclick="location.href='/'">Về trang chủ</button>
        </div>
      </div>

      <div id="answers-review"></div>
    </div>
  </div>

  <script src="quiz.js"></script>
</body>
</html>

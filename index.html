    <h1>🎓 ICTutor</h1>

      <h2>💬 Bắt đầu học với AI</h2>
      <p>Click vào icon chat ở góc dưới để:</p>

        <li>Hỏi đáp về kiến thức ICT</li>

  </div>

  <!-- Chatling Widget Script -->
  <script>
    window.chtlConfig = { 
      chatbotId: "9742573297", 
      display: "page_inline" 
    };
  </script>
  <script async data-id="9742573297" data-display="page_inline" id="chtl-script" type="text/javascript" src="https://chatling.ai/js/embed.js"></script>
